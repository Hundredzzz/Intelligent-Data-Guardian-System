server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: guardian-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/guardian?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

guardian:
  jwt:
    # Production deployments should override this value with a longer secret.
    secret: "${JWT_SECRET:guardian-development-secret-key-change-me-guardian-development-secret-key}"
    expiration-minutes: 120
  deepseek:
    api-url: https://api.deepseek.com/chat/completions
    api-key: ${DEEPSEEK_API_KEY:}
    model: deepseek-chat

logging:
  level:
    com.guardian: info
